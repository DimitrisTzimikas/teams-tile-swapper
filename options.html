<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Teams Tile Swapper</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        max-width: 480px;
        color: #1f1f1f;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 12px 0 6px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
      }
      .preview {
        margin-top: 12px;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #eee center/cover no-repeat;
        border-radius: 6px;
        border: 1px solid #ddd;
      }
      button {
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }
      .status {
        font-size: 12px;
        color: #0a7a0a;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Teams Tile Swapper</h1>

    <div class="row">
      <input type="checkbox" id="enabled" />
      <label for="enabled" style="margin: 0">Enabled</label>
    </div>

    <label for="file">Custom image</label>
    <input type="file" id="file" accept="image/*" />
    <div class="hint">
      Stored locally in your browser. Large images are downscaled.
    </div>

    <div class="preview" id="preview"></div>

    <div class="row">
      <button id="clear">Remove image</button>
      <span class="status" id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
