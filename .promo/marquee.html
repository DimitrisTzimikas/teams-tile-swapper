<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1400px; height: 560px; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #6264a7 0%, #4b4d94 60%, #3a3c7a 100%);
    color: #fff;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 80px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
    top: -150px;
    right: -150px;
  }
  .left {
    position: relative;
    z-index: 2;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 600;
  }
  h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  p {
    font-size: 20px;
    opacity: 0.92;
    line-height: 1.5;
    max-width: 520px;
  }
  .right {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    transform: rotate(-5deg);
  }
  .tile {
    aspect-ratio: 1;
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }
  .tile::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
  }
  .bg1 { background: linear-gradient(135deg, #ff9a8b, #ff6a88 50%, #ff99ac); }
  .bg2 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
  .bg3 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
  .bg4 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
  .bg5 { background: linear-gradient(135deg, #d299c2, #fef9d7); }
  .bg6 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="logo">
      <div class="logo-icon">🎭</div>
      <span class="logo-text">Teams Tile Swapper</span>
    </div>
    <div class="badge">🐱 Cats · 🐶 Dogs · 🖼 Custom</div>
    <h1>Replace boring Teams avatars</h1>
    <p>Swap camera-off participant tiles with a custom image, random cats, or random dogs. Works instantly in Microsoft Teams on the web.</p>
  </div>
  <div class="right">
    <div class="tile bg1"></div>
    <div class="tile bg2"></div>
    <div class="tile bg3"></div>
    <div class="tile bg4"></div>
    <div class="tile bg5"></div>
    <div class="tile bg6"></div>
  </div>
</body>
</html>
