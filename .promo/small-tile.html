<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 440px; height: 280px; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #6264a7 0%, #4b4d94 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 24px 28px;
    position: relative;
  }
  .logo {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  p {
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.45;
    max-width: 280px;
  }
  .tiles {
    position: absolute;
    right: -20px;
    bottom: -20px;
    display: grid;
    grid-template-columns: repeat(2, 80px);
    gap: 6px;
    transform: rotate(-8deg);
  }
  .tile {
    height: 80px;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .t1 { background: linear-gradient(135deg, #ff9a8b, #ff6a88); }
  .t2 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
  .t3 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
  .t4 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
</style>
</head>
<body>
  <div class="logo">🎭</div>
  <h1>Teams Tile Swapper</h1>
  <p>Custom image, random cats, or random dogs on every camera-off tile.</p>
  <div class="tiles">
    <div class="tile t1"></div>
    <div class="tile t2"></div>
    <div class="tile t3"></div>
    <div class="tile t4"></div>
  </div>
</body>
</html>
